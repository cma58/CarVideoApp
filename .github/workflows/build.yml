name: Build & Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bereken versie uit run_number
        id: ver
        run: |
          N=$((${{ github.run_number }} - 1))
          MAJOR=$((N / 100))
          MINOR=$(((N / 10) % 10))
          PATCH=$((N % 10))
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Hernoem APK met versie
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk "out/CarVideoApp-v${{ steps.ver.outputs.version }}.apk"

      - name: Maak release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "CarVideoApp v${{ steps.ver.outputs.version }}"
          files: out/CarVideoApp-v${{ steps.ver.outputs.version }}.apk
